<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>組隊小工具</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;700;900&display=swap');

  :root {
    --bg:        #0d1117;
    --card:      #161b25;
    --card2:     #1e2535;
    --border:    #2a3550;
    --text:      #dde6f5;
    --muted:     #5a7299;
    --accent:    #4a9eff;
    --accent-dk: #2f7de0;
    --accent-glow: rgba(74,158,255,.25);
    --red:       #e05566;
    --yellow:    #f0c040;
    --p1: #4caf50;
    --p2: #c89060;
    --p3: #4a9eff;
    --p4: #a07ab0;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Noto Sans TC', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 16px;
    background-image: radial-gradient(ellipse at 20% 30%, rgba(74,158,255,.07) 0%, transparent 60%),
                      radial-gradient(ellipse at 80% 80%, rgba(47,125,224,.05) 0%, transparent 60%);
  }

  /* ── LOBBY ── */
  #setupScreen {
    width: 340px;
    background: var(--card);
    border-radius: 22px;
    padding: 38px 28px 30px;
    box-shadow: 0 0 0 1px var(--border), 0 20px 60px rgba(0,0,0,.7), 0 0 40px rgba(74,158,255,.06);
  }
  #setupScreen h1 {
    text-align: center;
    font-size: 1.5rem;
    font-weight: 900;
    letter-spacing: .06em;
    margin-bottom: 4px;
    background: linear-gradient(135deg, #7dc4ff, #4a9eff);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
  }
  .subtitle {
    text-align: center;
    font-size: .78rem;
    color: var(--muted);
    margin-bottom: 28px;
    letter-spacing: .04em;
  }

  .input-row { display: flex; gap: 10px; margin-bottom: 12px; }
  .input-row input {
    flex: 1;
    background: var(--card2);
    border: 1px solid var(--border);
    border-radius: 11px;
    padding: 12px 16px;
    font-size: 1rem;
    color: var(--text);
    outline: none;
    transition: border-color .15s;
    font-family: 'Noto Sans TC', sans-serif;
  }
  .input-row input::placeholder { color: var(--muted); }
  .input-row input:focus { border-color: var(--accent); box-shadow: 0 0 0 3px var(--accent-glow); }

  .btn {
    background: var(--accent);
    color: #fff;
    border: none;
    border-radius: 11px;
    padding: 12px 20px;
    font-size: 1rem;
    font-weight: 700;
    cursor: pointer;
    transition: background .15s, box-shadow .15s;
    white-space: nowrap;
    font-family: 'Noto Sans TC', sans-serif;
  }
  .btn:hover { background: var(--accent-dk); box-shadow: 0 4px 16px var(--accent-glow); }
  .btn.red  { background: var(--red); }
  .btn.red:hover { background: #c03a4a; box-shadow: 0 4px 16px rgba(224,85,102,.3); }
  .btn.grey { background: #2a3550; }
  .btn.grey:hover { background: #354268; box-shadow: none; }

  .or { text-align: center; color: var(--muted); margin: 4px 0 12px; font-size: .88rem; }
  .error-msg { color: var(--red); font-size: .84rem; text-align: center; margin-top: 8px; min-height: 1.3em; }

  /* ── PASSWORD ── */
  #pwScreen {
    display: none;
    width: 340px;
    background: var(--card);
    border-radius: 22px;
    padding: 34px 28px;
    box-shadow: 0 0 0 1px var(--border), 0 20px 60px rgba(0,0,0,.7);
  }
  .room-badge { text-align: center; font-size: 1.6rem; font-weight: 900; margin-bottom: 22px; }
  .room-badge em { color: var(--yellow); font-style: normal; }

  /* ── PLAYER SELECT ── */
  #playerSelectScreen {
    display: none;
    width: 340px;
    background: var(--card);
    border-radius: 22px;
    padding: 34px 28px 30px;
    box-shadow: 0 0 0 1px var(--border), 0 20px 60px rgba(0,0,0,.7);
  }
  #playerSelectScreen h2 {
    text-align: center;
    font-size: 1.1rem;
    font-weight: 900;
    margin-bottom: 6px;
    color: var(--text);
  }
  #playerSelectScreen .ps-sub {
    text-align: center;
    font-size: .78rem;
    color: var(--muted);
    margin-bottom: 22px;
  }
  #playerSelectScreen .ps-room {
    text-align: center;
    font-size: .85rem;
    color: var(--muted);
    margin-bottom: 20px;
  }
  #playerSelectScreen .ps-room em { color: var(--yellow); font-style: normal; font-weight: 700; }
  .player-pick-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 12px;
    margin-bottom: 16px;
  }
  .player-pick-btn {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 8px;
    padding: 16px 10px;
    border-radius: 14px;
    border: 2px solid var(--border);
    background: var(--card2);
    cursor: pointer;
    transition: border-color .15s, background .15s, transform .1s, box-shadow .15s;
    position: relative;
  }
  .player-pick-btn:hover:not(.taken) {
    transform: scale(1.04);
  }
  .player-pick-btn.taken {
    opacity: .4;
    cursor: not-allowed;
  }
  .player-pick-btn .pick-emoji { font-size: 2rem; }
  .player-pick-btn .pick-name { font-size: .95rem; font-weight: 900; }
  .player-pick-btn .pick-status {
    font-size: .7rem;
    color: var(--muted);
    font-weight: 400;
  }
  .player-pick-btn .taken-badge {
    position: absolute;
    top: 8px; right: 8px;
    font-size: .65rem;
    background: var(--red);
    color: #fff;
    border-radius: 6px;
    padding: 2px 6px;
    font-weight: 700;
  }
  .ps-back { display: flex; justify-content: center; }

  /* ── GAME ── */
  #game { display: none; width: 100%; max-width: 640px; }

  .game-header {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 14px;
    background: var(--card);
    border-radius: 14px;
    padding: 10px 14px;
    border: 1px solid var(--border);
  }
  .back-btn {
    background: var(--red);
    border: none;
    border-radius: 9px;
    width: 36px; height: 36px;
    color: #fff;
    font-size: 1rem;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0;
    transition: opacity .15s;
  }
  .back-btn:hover { opacity: .8; }
  .room-info { flex: 1; font-size: .85rem; color: var(--muted); }
  .room-info strong { color: var(--yellow); font-size: .95rem; }
  .conn-badge { font-size: .74rem; padding: 4px 10px; border-radius: 20px; font-weight: 700; }
  .conn-badge.ok  { background: #0d2340; color: var(--accent); }
  .conn-badge.err { background: #3d1a1a; color: var(--red); }

  /* players */
  .players-row { display: flex; gap: 12px; justify-content: center; margin-bottom: 16px; }
  .player-slot { display: flex; flex-direction: column; align-items: center; gap: 5px; }
  .player-icon {
    width: 50px; height: 50px;
    border-radius: 14px;
    display: flex; align-items: center; justify-content: center;
    font-size: 1.5rem;
    border: 2px solid transparent;
    transition: opacity .3s, transform .15s;
  }
  .player-icon.me {
    border-color: var(--yellow) !important;
    box-shadow: 0 0 14px rgba(240,192,64,.4);
    transform: scale(1.08);
  }
  .player-icon.online  { opacity: 1; }
  .player-icon.offline { opacity: .25; }
  .player-label { font-size: .7rem; font-weight: 700; }

  /* config bar */
  .config-bar {
    display: flex; gap: 8px; align-items: center;
    margin-bottom: 12px;
    background: var(--card);
    border-radius: 12px;
    padding: 10px 14px;
    flex-wrap: wrap;
    border: 1px solid var(--border);
  }
  .config-bar label { font-size: .85rem; color: var(--muted); flex-shrink: 0; }
  .config-bar input[type=number] {
    width: 56px;
    background: var(--card2);
    border: 1px solid var(--border);
    border-radius: 8px;
    color: var(--text);
    padding: 5px 8px;
    font-size: .9rem;
    outline: none;
    text-align: center;
    font-family: 'Noto Sans TC', sans-serif;
  }
  .config-bar input:focus { border-color: var(--accent); }
  .config-bar .btn { padding: 6px 14px; font-size: .85rem; }

  /* grid */
  .grid-wrap {
    background: var(--card);
    border-radius: 16px;
    padding: 14px 12px;
    border: 1px solid var(--border);
  }
  .grid-row { display: flex; align-items: center; gap: 8px; margin-bottom: 8px; }
  .grid-row:last-child { margin-bottom: 0; }
  .row-label { width: 24px; text-align: center; font-size: .9rem; font-weight: 700; color: var(--muted); flex-shrink: 0; }

  .cell {
    flex: 1;
    height: 50px;
    border-radius: 11px;
    background: var(--card2);
    display: flex; align-items: center; justify-content: center;
    font-size: 1rem; font-weight: 700;
    color: rgba(255,255,255,.18);
    cursor: pointer;
    transition: background .15s, transform .1s, box-shadow .15s, border-color .15s;
    user-select: none;
    border: 2px solid transparent;
    -webkit-tap-highlight-color: transparent;
  }
  .cell:hover  { transform: scale(1.06); border-color: rgba(74,158,255,.2); }
  .cell:active { transform: scale(.93); }

  /* teammate colours (dim) */
  .cell[data-owner="1"]      { background: #173320; color: #aee8b0; }
  .cell[data-owner="2"]      { background: #3a2510; color: #e8c898; }
  .cell[data-owner="3"]      { background: #0e2445; color: #90c4ff; }
  .cell[data-owner="4"]      { background: #2e1e38; color: #c8a8e0; }

  /* my own cells (bright) */
  .cell[data-owner="1"].mine { background: var(--p1); color: #fff; box-shadow: 0 0 12px #4caf5060; border-color: #4caf5080; }
  .cell[data-owner="2"].mine { background: var(--p2); color: #fff; box-shadow: 0 0 12px #c8906060; border-color: #c8906080; }
  .cell[data-owner="3"].mine { background: var(--p3); color: #fff; box-shadow: 0 0 12px #4a9eff60; border-color: #4a9eff80; }
  .cell[data-owner="4"].mine { background: var(--p4); color: #fff; box-shadow: 0 0 12px #a07ab060; border-color: #a07ab080; }

  .status-bar { text-align: center; font-size: .78rem; color: var(--muted); margin-top: 10px; height: 1.4em; }
  .dot { display: inline-block; width: 7px; height: 7px; border-radius: 50%; background: var(--accent); margin-right: 5px; animation: pulse 1.5s infinite; }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.15} }

  /* loading */
  #loadingOverlay {
    display: none;
    position: fixed; inset: 0;
    background: rgba(13,17,23,.88);
    z-index: 999;
    align-items: center;
    justify-content: center;
    flex-direction: column;
    gap: 14px;
    font-size: .95rem;
    color: var(--muted);
  }
  #loadingOverlay.show { display: flex; }
  .spinner {
    width: 36px; height: 36px;
    border: 3px solid var(--border);
    border-top-color: var(--accent);
    border-radius: 50%;
    animation: spin .7s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
</style>
</head>
<body>

<div id="loadingOverlay"><div class="spinner"></div><span id="loadingMsg">連線中…</span></div>

<!-- LOBBY -->
<div id="setupScreen">
  <h1>組隊小工具</h1>
  <p class="subtitle">即時跨裝置同步 · v2.0</p>

  <div class="input-row">
    <input id="joinRoomInput" type="text" placeholder="輸入房號" maxlength="8">
    <button class="btn" onclick="doJoin()">進入</button>
  </div>
  <div class="or">或者</div>
  <div class="input-row">
    <input id="createPwInput" type="password" placeholder="設定密碼（可空白）" maxlength="20">
    <button class="btn" onclick="doCreate()">建立</button>
  </div>
  <div class="error-msg" id="setupErr"></div>
</div>

<!-- PASSWORD -->
<div id="pwScreen">
  <div class="room-badge">房號：<em id="pwRoomNum"></em></div>
  <div class="input-row">
    <button class="btn red" style="padding:12px 14px;flex-shrink:0" onclick="showSetup()">←</button>
    <input id="pwInput" type="password" placeholder="輸入密碼" maxlength="20">
    <button class="btn" onclick="doPwSubmit()">輸入</button>
  </div>
  <div class="error-msg" id="pwErr"></div>
</div>

<!-- PLAYER SELECT -->
<div id="playerSelectScreen">
  <h2>選擇你的角色</h2>
  <p class="ps-sub">點選你要扮演的玩家</p>
  <div class="ps-room">房號：<em id="psRoomNum"></em></div>
  <div class="player-pick-grid" id="playerPickGrid"></div>
  <div class="ps-back">
    <button class="btn grey" style="font-size:.85rem;padding:8px 20px" onclick="showSetup()">← 返回</button>
  </div>
  <div class="error-msg" id="psErr"></div>
</div>

<!-- GAME -->
<div id="game">
  <div class="game-header">
    <button class="back-btn" onclick="doLeave()">←</button>
    <div class="room-info">
      房號 <strong id="gameRoomNum"></strong>
      &nbsp;|&nbsp; 你是玩家 <strong id="myPidDisplay" style="color:var(--accent)"></strong>
    </div>
    <div class="conn-badge ok" id="connBadge">● 已連線</div>
  </div>

  <div class="players-row" id="playersRow"></div>

  <div class="config-bar">
    <label>行</label>
    <input type="number" id="cfgRows" value="5" min="1" max="20">
    <label>列</label>
    <input type="number" id="cfgCols" value="4" min="1" max="10">
    <button class="btn" onclick="applyConfig()">套用</button>
    <button class="btn grey" onclick="clearAll()">全清</button>
  </div>

  <div class="grid-wrap">
    <div id="gridContainer"></div>
  </div>
  <div class="status-bar" id="statusBar"><span class="dot"></span>即時同步中</div>
</div>

<!-- Firebase SDK -->
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>

<script>
// ── Firebase config (hardcoded, not shown in UI) ──
const FB_CONFIG = {
  apiKey:      'kBWI7U5IuYyuNECvCbe8Gr3EsABjrZ0sJwfAC84Y',
  authDomain:  'yoyoyo-393d3.firebaseapp.com',
  projectId:   'yoyoyo-393d3',
  databaseURL: 'https://yoyoyo-393d3-default-rtdb.firebaseio.com'
};

const COLORS       = ['#4caf50','#c89060','#4a9eff','#a07ab0'];
const PLAYER_EMOJI = ['😀','😎','🤖','👾'];
const PING_INTERVAL = 4000;
const OFFLINE_AFTER = 12000;

let firebaseApp   = null;
let db            = null;
let roomRef       = null;
let listeners     = [];
let myRoom        = null;
let myPlayer      = null;
let rows = 5, cols = 4;
let gridState     = [];
let onlinePlayers = {};
let pingTimer     = null;

const $ = id => document.getElementById(id);

function showLoading(msg='連線中…'){ $('loadingMsg').textContent=msg; $('loadingOverlay').classList.add('show'); }
function hideLoading(){ $('loadingOverlay').classList.remove('show'); }
function makeGrid(r,c){ return Array.from({length:r},()=>Array(c).fill(0)); }

// ── Init Firebase once ──
function ensureFirebase(){
  if(db) return true;
  try{
    // compat SDK: firebase.apps is an array, check length or filter by name
    const existing = firebase.apps.filter(a => a.name === 'teamtool')[0];
    firebaseApp = existing || firebase.initializeApp(FB_CONFIG, 'teamtool');
    db = firebase.database(firebaseApp);
    return true;
  }catch(e){
    $('setupErr').textContent = 'Firebase 連線失敗：' + e.message;
    console.error('Firebase init error:', e);
    return false;
  }
}

// ── Create room ──
async function doCreate(){
  $('setupErr').textContent='';
  if(!ensureFirebase()) return;
  showLoading('建立房間…');
  const pw      = $('createPwInput').value.trim();
  const roomNum = Math.floor(100000+Math.random()*900000).toString();
  const init    = { pw, rows:5, cols:4, grid:makeGrid(5,4), players:{} };
  try{
    await db.ref('rooms/'+roomNum).set(init);
    hideLoading();
    myRoom = roomNum;
    showPlayerSelect(roomNum, init);
  }catch(e){
    hideLoading();
    $('setupErr').textContent='建立失敗：'+e.message;
  }
}

// ── Join room ──
async function doJoin(){
  $('setupErr').textContent='';
  const room = $('joinRoomInput').value.trim();
  if(!room){ $('setupErr').textContent='請輸入房號'; return; }
  if(!ensureFirebase()) return;
  showLoading('查詢房間…');
  try{
    const snap = await db.ref('rooms/'+room).once('value');
    hideLoading();
    if(!snap.exists()){ $('setupErr').textContent='房號不存在'; return; }
    const data = snap.val();
    myRoom = room;
    if(data.pw){ showPwScreen(room); }
    else{ await assignAndEnter(room, data); }
  }catch(e){
    hideLoading();
    $('setupErr').textContent='連線失敗：'+e.message;
  }
}

function showPwScreen(room){
  $('setupScreen').style.display='none';
  $('pwRoomNum').textContent=room;
  $('pwScreen').style.display='block';
}
function showSetup(){
  $('pwScreen').style.display='none';
  $('playerSelectScreen').style.display='none';
  $('setupScreen').style.display='block';
}

async function doPwSubmit(){
  $('pwErr').textContent='';
  const pw = $('pwInput').value.trim();
  showLoading('驗證密碼…');
  try{
    const snap = await db.ref('rooms/'+myRoom).once('value');
    hideLoading();
    const data = snap.val();
    if(data.pw && data.pw!==pw){ $('pwErr').textContent='密碼錯誤'; return; }
    $('pwScreen').style.display='none';
    await assignAndEnter(myRoom, data);
  }catch(e){
    hideLoading();
    $('pwErr').textContent='連線失敗：'+e.message;
  }
}

async function assignAndEnter(room, data){
  // Show player selection screen instead of auto-assigning
  showPlayerSelect(room, data);
}

function showPlayerSelect(room, data){
  const NAMES  = ['玩家 1','玩家 2','玩家 3','玩家 4'];
  const COLBG  = ['#173320','#3a2510','#0e2445','#2e1e38'];
  const COLBDR = ['#4caf50','#c89060','#4a9eff','#a07ab0'];

  $('setupScreen').style.display='none';
  $('pwScreen').style.display='none';
  $('psRoomNum').textContent = room;
  $('psErr').textContent = '';

  const now    = Date.now();
  const players = data.players || {};
  // who is actively online
  const active = Object.keys(players).map(Number).filter(p => players[p] && (now - players[p]) < OFFLINE_AFTER);

  const grid = $('playerPickGrid');
  grid.innerHTML = '';

  for(let p=1; p<=4; p++){
    const isTaken = active.includes(p);
    const btn = document.createElement('div');
    btn.className = 'player-pick-btn' + (isTaken ? ' taken' : '');
    btn.style.borderColor = isTaken ? 'var(--border)' : COLBDR[p-1];
    btn.style.background  = isTaken ? 'var(--card2)' : COLBG[p-1];
    if(!isTaken) btn.style.boxShadow = `0 0 16px ${COLBDR[p-1]}33`;

    btn.innerHTML = `
      ${isTaken ? '<span class="taken-badge">使用中</span>' : ''}
      <span class="pick-emoji">${['😀','😎','🤖','👾'][p-1]}</span>
      <span class="pick-name" style="color:${COLBDR[p-1]}">${NAMES[p-1]}</span>
      <span class="pick-status">${isTaken ? '已有人使用' : '點選加入'}</span>
    `;

    if(!isTaken){
      btn.onclick = () => {
        $('playerSelectScreen').style.display='none';
        enterGame(room, p);
      };
    }
    grid.appendChild(btn);
  }

  $('playerSelectScreen').style.display='block';
}

// ── Enter game ──
function enterGame(room, pid){
  myRoom=room; myPlayer=pid;
  roomRef = db.ref('rooms/'+room);
  showLoading('載入房間…');
  roomRef.once('value').then(snap=>{
    hideLoading();
    const data = snap.val()||{};
    rows = data.rows||5; cols = data.cols||4;
    gridState = data.grid
      ? Object.values(data.grid).map(r=>Object.values(r))
      : makeGrid(rows,cols);
    $('cfgRows').value=rows; $('cfgCols').value=cols;
    $('setupScreen').style.display='none';
    $('pwScreen').style.display='none';
    $('game').style.display='block';
    $('gameRoomNum').textContent=room;
    $('myPidDisplay').textContent=pid;
    renderPlayers(); renderGrid(); attachListeners();

    const presRef = db.ref('rooms/'+room+'/players/'+pid);
    presRef.set(Date.now());
    presRef.onDisconnect().remove();
    if(pingTimer) clearInterval(pingTimer);
    pingTimer = setInterval(()=>presRef.set(Date.now()), PING_INTERVAL);
  }).catch(e=>{
    hideLoading();
    $('setupErr').textContent='載入失敗：'+e.message;
    showSetup();
  });
}

// ── Listeners ──
function attachListeners(){
  detachListeners();

  const gRef = roomRef.child('grid');
  const gFn  = snap=>{
    const raw=snap.val(); if(!raw) return;
    gridState=Object.values(raw).map(r=>Object.values(r));
    renderGrid();
  };
  gRef.on('value',gFn);
  listeners.push({ref:gRef,event:'value',fn:gFn});

  const rowsFn=snap=>{ if(snap.val()){ rows=snap.val(); $('cfgRows').value=rows; } };
  const colsFn=snap=>{ if(snap.val()){ cols=snap.val(); $('cfgCols').value=cols; } };
  roomRef.child('rows').on('value',rowsFn);
  roomRef.child('cols').on('value',colsFn);
  listeners.push({ref:roomRef.child('rows'),event:'value',fn:rowsFn});
  listeners.push({ref:roomRef.child('cols'),event:'value',fn:colsFn});

  const pRef=roomRef.child('players');
  const pFn =snap=>{ onlinePlayers=snap.val()||{}; renderPlayers(); };
  pRef.on('value',pFn);
  listeners.push({ref:pRef,event:'value',fn:pFn});

  db.ref('.info/connected').on('value',snap=>{
    const b=$('connBadge');
    if(snap.val()){ b.textContent='● 已連線'; b.className='conn-badge ok'; $('statusBar').innerHTML='<span class="dot"></span>即時同步中'; }
    else           { b.textContent='● 已離線'; b.className='conn-badge err'; $('statusBar').textContent='連線中斷，等待重連…'; }
  });
}
function detachListeners(){ listeners.forEach(({ref,event,fn})=>ref.off(event,fn)); listeners=[]; }

// ── Leave ──
async function doLeave(){
  if(pingTimer) clearInterval(pingTimer);
  detachListeners();
  if(roomRef&&myPlayer) await roomRef.child('players/'+myPlayer).remove().catch(()=>{});
  $('game').style.display='none';
  $('setupScreen').style.display='block';
  myRoom=null; myPlayer=null; roomRef=null;
}

// ── Cell click ──
function cellClick(r,c){
  const cur=(gridState[r]&&gridState[r][c])||0;
  const newVal=(cur===myPlayer)?0:(cur===0?myPlayer:null);
  if(newVal===null) return;
  if(!gridState[r]) gridState[r]=[];
  gridState[r][c]=newVal;
  renderGrid();
  roomRef.child(`grid/${r}/${c}`).set(newVal).catch(e=>{ $('statusBar').textContent='同步失敗：'+e.message; });
}

function applyConfig(){
  const r=Math.max(1,Math.min(20,parseInt($('cfgRows').value)||5));
  const c=Math.max(1,Math.min(10,parseInt($('cfgCols').value)||4));
  rows=r; cols=c; gridState=makeGrid(r,c); renderGrid();
  roomRef.update({rows:r,cols:c,grid:gridState}).catch(()=>{});
}
function clearAll(){
  gridState=makeGrid(rows,cols); renderGrid();
  roomRef.child('grid').set(gridState).catch(()=>{});
}

// ── Render grid ──
function renderGrid(){
  const container=$('gridContainer'); container.innerHTML='';
  for(let r=rows-1;r>=0;r--){
    const rowEl=document.createElement('div'); rowEl.className='grid-row';
    const lbl=document.createElement('div'); lbl.className='row-label'; lbl.textContent=r+1;
    rowEl.appendChild(lbl);
    for(let c=0;c<cols;c++){
      const cell=document.createElement('div'); cell.className='cell'; cell.textContent=c+1;
      const owner=(gridState[r]&&gridState[r][c])||0;
      if(owner){ cell.dataset.owner=owner; if(owner===myPlayer) cell.classList.add('mine'); }
      cell.onclick=()=>cellClick(r,c);
      rowEl.appendChild(cell);
    }
    container.appendChild(rowEl);
  }
}

// ── Render players ──
function renderPlayers(){
  const row=$('playersRow'); row.innerHTML='';
  const now=Date.now();
  for(let p=1;p<=4;p++){
    const slot=document.createElement('div'); slot.className='player-slot';
    const icon=document.createElement('div'); icon.className='player-icon';
    icon.style.background=COLORS[p-1]+'30';
    icon.style.border=`2px solid ${COLORS[p-1]}`;
    icon.textContent=PLAYER_EMOJI[p-1];
    const last=onlinePlayers[p];
    icon.classList.add((last&&(now-last)<OFFLINE_AFTER)?'online':'offline');
    if(p===myPlayer) icon.classList.add('me');
    const lbl=document.createElement('div'); lbl.className='player-label';
    lbl.textContent=`P${p}`; lbl.style.color=COLORS[p-1];
    slot.append(icon,lbl); row.appendChild(slot);
  }
}
</script>
</body>
